<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#18312c" />
    <title>WhyTx — Live product demo</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 32px; background: #18312c; color: #fff; font: 15px system-ui, sans-serif; }
      main { width: min(1100px, 100%); }
      header { display: flex; align-items: end; justify-content: space-between; gap: 24px; margin-bottom: 20px; }
      h1 { margin: 0 0 5px; font-size: 28px; letter-spacing: -1px; }
      p { margin: 0; color: #b9c8c2; }
      a { color: #dff472; text-underline-offset: 4px; }
      video { display: block; width: 100%; border-radius: 14px; border: 1px solid #527066; background: #f4f1e9; box-shadow: 0 20px 70px #0005; }
      @media (max-width: 600px) { body { padding: 18px; } header { align-items: start; flex-direction: column; } }
    </style>
  </head>
  <body>
    <main>
      <header><div><h1>WhyTx product demo</h1><p>A complete 2:23 walkthrough with wallet connection, real Monad Mainnet proofs, selective reveal, version history, session restore, and network switching.</p></div><a href="./">Open the live app</a></header>
      <video controls playsinline preload="metadata" poster="./og.png">
        <source src="./demo.mp4" type="video/mp4" />
        <track kind="subtitles" src="./demo.vtt" srclang="en" label="English" />
        Your browser does not support MP4 video.
      </video>
    </main>
  </body>
</html>
